<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Evaluation Report</title>
<style>/*{{SRC_CSS}}*/</style>
</head>
<body>

<div id="scroll-progress"></div>

<header class="top-bar">
  <span class="skill-name" id="skill-name"></span>
  <div class="iter-control" id="iter-control"></div>
  <div class="top-bar-right">
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme">&#9789;</button>
  </div>
</header>

<nav class="page-tabs" id="page-tabs">
  <button class="page-tab active" data-page="progression">Progression</button>
  <button class="page-tab" data-page="benchmark">Benchmark</button>
  <button class="page-tab" data-page="review">Review</button>
</nav>

<button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content" id="main-content"></main>
</div>

<footer class="app-footer">Generated by Skill Eval Runner</footer>

<button class="back-to-top" id="back-to-top" title="Back to top">&#8593;</button>

<div class="chart-tooltip" id="chart-tooltip"></div>

<script>
(function(){
"use strict";

/*__EMBEDDED_DATA__*/

var D = (typeof EMBEDDED_DATA !== "undefined") ? EMBEDDED_DATA : {};

var state = {
  activePage: "progression",
  activeIteration: D.served_iteration || 1,
  servedIteration: D.served_iteration || 1,
  currentReviewEval: 0,
  feedbackMap: {},
  hasMultipleIterations: (D.iterations || []).length > 1,
  runsCache: {},
  runsInflight: {}
};

var $main       = document.getElementById("main-content");
var $sidebar    = document.getElementById("sidebar");
var $iterControl= document.getElementById("iter-control");
var $skillName  = document.getElementById("skill-name");
var $tooltip    = document.getElementById("chart-tooltip");
var $scrollProg = document.getElementById("scroll-progress");
var $backToTop  = document.getElementById("back-to-top");

/*{{SRC_JS}}*/

function init(){
  $skillName.textContent = "Skill Evaluation" + (D.skill_name ? " – " + D.skill_name : "");
  initTheme();
  initTabs();
  initSidebarToggle();
  initScrollListeners();
  loadFeedback();
  buildIterTimeline();
  switchPage("progression");
}

if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

})();
</script>
</body>
</html>
