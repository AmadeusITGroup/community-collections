    kind: skill
  - path: foursight/code-review/agents.foursight-code-review.agent.md
    kind: agent
  - path: foursight/agents/code-review-qa.agent.md
    kind: agent
  - path: foursight/agents/code-review-tech-debt.agent.md
    kind: agent
  - path: foursight/agents/code-review-functional.agent.md
    kind: agent
  - path: foursight/agents/code-review-architecture.agent.md
    kind: agent
version: "1.0.1"
author: "Guillaume Blanc"
readme:
  path: foursight/code-review/README.md
display:
  ordering: manual
  show_badge: true
