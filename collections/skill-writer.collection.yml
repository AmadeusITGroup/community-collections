  - skill-writer
  - skills
  - authoring
  - agent-skills
  - best-practices
items:
  - path: skills/skill-writer/SKILL.md
    kind: skill
version: "1.0.0"
readme:
  path: skills/skill-writer/README.md
display:
  ordering: manual
  show_badge: true
