# yaml-language-server: $schema=https://raw.githubusercontent.com/AmadeusITGroup/prompt-registry/refs/heads/main/schemas/collection.schema.json
id: amadeus-ospo
name: Amadeus OSPO
description: Skills collection for Amadeus OSPO - InnerSource and Open Source readiness assessments, GitHub triage tools
author: "Waldek Herka"
version: "1.0.0"
tags:
  - ospo
  - innersource
  - open source
  - github
  - triage
items:
  - path: ospo/skills/innersource-readiness/SKILL.md
    kind: skill
  - path: ospo/skills/open-source-readiness/SKILL.md
    kind: skill
  - path: ospo/skills/github-issues-triage/SKILL.md
    kind: skill
  - path: ospo/skills/github-prs-triage/SKILL.md
    kind: skill
  - path: ospo/prompts/assess-innersource-readiness.prompt.md
    kind: prompt
  - path: ospo/prompts/assess-opensource-readiness.prompt.md
    kind: prompt
  - path: ospo/prompts/triage-issues.prompt.md
    kind: prompt
  - path: ospo/prompts/triage-pull-requests.prompt.md
    kind: prompt
readme:
  path: ospo/README.md
display:
  ordering: manual
  show_badge: true
