# yaml-language-server: $schema=https://raw.githubusercontent.com/AmadeusITGroup/prompt-registry/refs/heads/main/schemas/collection.schema.json
id: amadeus-ospo
name: Amadeus OSPO
description: Skills collection for Amadeus OSPO - InnerSource and Open Source readiness assessments, GitHub triage tools
tags:
  - ospo
  - innersource
  - open source
  - github
  - triage
items:
  - path: skills/innersource-readiness/SKILL.md
    kind: skill
  - path: skills/open-source-readiness/SKILL.md
    kind: skill
  - path: skills/github-issues-triage/SKILL.md
    kind: skill
  - path: skills/github-prs-triage/SKILL.md
    kind: skill
  - path: prompts/assess-innersource-readiness.prompt.md
    kind: prompt
  - path: prompts/assess-opensource-readiness.prompt.md
    kind: prompt
  - path: prompts/triage-issues.prompt.md
    kind: prompt
  - path: prompts/triage-pull-requests.prompt.md
    kind: prompt
readme:
  path: docs/ospo-collection/README.md
display:
  ordering: manual
  show_badge: true
