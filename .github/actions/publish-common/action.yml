name: Publish Common Setup
description: Common steps for publish workflow (checkout, tags, node, deps, validate)
inputs:
  node-version:
    description: Node.js version
    required: false
    default: '20.x'
outputs:
  validation-status:
    description: Validation status (success or failure)
    value: ${{ steps.validate.outputs.status }}
  test-status:
    description: Python unit-test status (success or failure)
    value: ${{ steps.tests.outputs.status }}
runs:
  using: composite
  steps:
    - name: Fetch tags
      shell: bash
      run: git fetch --tags --force

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      shell: bash
      run: npm ci
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}

    - name: Validate collections
      id: validate
      shell: bash
      run: |
        if npm run validate -- --output-markdown validation-comment.md; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
        fi

    # Zero-dependency stdlib unittest suite for the skill-eval framework via a
    # path-based runner (skill test dirs contain dashes, so `unittest discover`
    # can't import them). Verbose log goes to test-results.txt; a summary is
    # appended to the PR comment. Status is captured so the comment/artifacts
    # still post; caller fails after.
    - name: Run Python unit tests
      id: tests
      shell: bash
      env:
        CI: "true"
      run: |
        set -o pipefail
        if npm test -- -v --md-summary test-summary.md 2>&1 | tee test-results.txt; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
        fi
        if [ -f test-summary.md ]; then
          { echo ""; echo "---"; echo ""; cat test-summary.md; } >> validation-comment.md
        fi

    - name: Upload validation results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-results
        path: |
          validation-comment.md
          validation.log
          pr-number.txt
          test-results.txt
          collections/
        if-no-files-found: ignore
